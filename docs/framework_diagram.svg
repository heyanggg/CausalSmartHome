<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
  <style>
    .title{font:700 26px sans-serif;fill:#172033}.label{font:600 16px sans-serif;fill:#172033}
    .small{font:14px sans-serif;fill:#43506a}.box{fill:#eef4ff;stroke:#4776c5;stroke-width:2;rx:12}
    .eval{fill:#fff5e8;stroke:#d9822b;stroke-width:2;rx:12}.arrow{stroke:#64748b;stroke-width:3;marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <text x="40" y="48" class="title">CausalSmartHome: target-aware causal experiment pipeline</text>
  <text x="40" y="78" class="small">Target normal behavior weights the source causal prior; Gen TOF and downstream AD remain unchanged.</text>
  <rect x="40" y="130" width="190" height="90" class="box"/><text x="62" y="165" class="label">Source normal data</text><text x="62" y="192" class="small">original context only</text>
  <rect x="280" y="130" width="200" height="90" class="box"/><text x="302" y="158" class="label">Source causal prior</text><text x="302" y="185" class="small">+ GSS transitions</text>
  <rect x="530" y="130" width="190" height="90" class="box"/><text x="552" y="158" class="label">Target-aware causal</text><text x="552" y="185" class="small">GSS prompt hints</text>
  <rect x="770" y="130" width="160" height="90" class="box"/><text x="792" y="165" class="label">Codex</text><text x="792" y="192" class="small">context adaptation</text>
  <rect x="980" y="130" width="170" height="90" class="box"/><text x="1002" y="165" class="label">Gen original TOF</text><text x="1002" y="192" class="small">only filter stage</text>
  <rect x="1200" y="130" width="160" height="90" class="eval"/><text x="1222" y="158" class="label">Causal-TOF</text><text x="1222" y="185" class="small">then unchanged</text><text x="1222" y="204" class="small">downstream AD</text>
  <line x1="230" y1="175" x2="275" y2="175" class="arrow"/><line x1="480" y1="175" x2="525" y2="175" class="arrow"/><line x1="720" y1="175" x2="765" y2="175" class="arrow"/><line x1="930" y1="175" x2="975" y2="175" class="arrow"/><line x1="1150" y1="175" x2="1195" y2="175" class="arrow"/>
  <text x="40" y="292" class="small">Canonical full variant: full_causal</text>
  <text x="40" y="322" class="small">Ablation: baseline_gen / causal_gss_only / causal_tof_only / full_causal; results remain per seed.</text>
</svg>
