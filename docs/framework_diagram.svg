<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="920" viewBox="0 0 1480 920" role="img" aria-labelledby="title desc">
  <title id="title">CausalSmartHome Gen + GCAD Framework</title>
  <desc id="desc">Framework diagram showing how GCAD causal priors are fused into Gen generation and anomaly detection.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 1.6; rx: 8; ry: 8; }
      .input { fill: #eef2ff; }
      .gcad { fill: #ecfeff; }
      .guard { fill: #f0fdf4; }
      .gen { fill: #fff7ed; }
      .eval { fill: #fdf2f8; }
      .artifact { fill: #f8fafc; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
      .lane { fill: none; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; ry: 14; }
      .laneText { font: 700 14px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="1480" height="920" fill="#ffffff"/>
  <text x="48" y="54" class="title">CausalSmartHome: Gen + GCAD Fusion Framework</text>
  <text x="48" y="82" class="subtitle">GCAD enters Gen twice: before generation as guarded causal-reweighted GSS hints, and after Gen TOF as Causal-TOF sequence scoring.</text>

  <rect x="32" y="118" width="1416" height="150" class="lane"/>
  <text x="52" y="143" class="laneText">Input and Schema Layer</text>
  <rect x="70" y="168" width="180" height="62" class="box input"/>
  <text x="92" y="193" class="label">Source normal pkl</text>
  <text x="92" y="215" class="small">winter/daytime/single</text>

  <rect x="300" y="168" width="180" height="62" class="box input"/>
  <text x="322" y="193" class="label">Target normal pkl</text>
  <text x="322" y="215" class="small">spring/night/multiple</text>

  <rect x="530" y="168" width="190" height="62" class="box artifact"/>
  <text x="552" y="193" class="label">dictionary.py</text>
  <text x="552" y="215" class="small">legal device/action IDs</text>

  <rect x="770" y="168" width="205" height="62" class="box artifact"/>
  <text x="792" y="193" class="label">BehaviorSequence</text>
  <text x="792" y="215" class="small">flat quadruple schema</text>

  <rect x="1025" y="168" width="250" height="62" class="box artifact"/>
  <text x="1047" y="193" class="label">Optional prior/matrix</text>
  <text x="1047" y="215" class="small">existing GCAD artifact</text>

  <rect x="32" y="302" width="1416" height="250" class="lane"/>
  <text x="52" y="327" class="laneText">Pre-Generation GCAD-to-Gen Fusion</text>

  <rect x="70" y="365" width="205" height="76" class="box gcad"/>
  <text x="92" y="392" class="label">EventTensorizer</text>
  <text x="92" y="414" class="small">Gen sequences -> [T, C]</text>

  <rect x="330" y="365" width="230" height="76" class="box gcad"/>
  <text x="352" y="392" class="label">Resolve GCAD prior</text>
  <text x="352" y="414" class="small">JSON / matrix / adapter</text>

  <rect x="615" y="365" width="230" height="76" class="box guard"/>
  <text x="637" y="392" class="label">Target guard</text>
  <text x="637" y="414" class="small">suppress or downweight</text>

  <rect x="70" y="470" width="205" height="58" class="box gen"/>
  <text x="92" y="495" class="label">Gen GSS graph</text>
  <text x="92" y="516" class="small">source transitions</text>

  <rect x="900" y="395" width="250" height="86" class="box gen"/>
  <text x="922" y="422" class="label">Causal-reweighted GSS</text>
  <text x="922" y="444" class="small">transition score + lambda</text>
  <text x="922" y="464" class="small">* guarded causal strength</text>

  <rect x="1210" y="395" width="200" height="86" class="box artifact"/>
  <text x="1232" y="422" class="label">Prompt package</text>
  <text x="1232" y="444" class="small">prompt, hints, guard</text>
  <text x="1232" y="464" class="small">resolved prior</text>

  <path class="arrow" d="M250 199 L770 199"/>
  <path class="arrow" d="M160 230 L160 365"/>
  <path class="arrow" d="M275 403 L330 403"/>
  <path class="dash" d="M1125 230 L500 365"/>
  <path class="arrow" d="M560 403 L615 403"/>
  <path class="arrow" d="M390 230 L700 365"/>
  <path class="arrow" d="M250 499 L900 438"/>
  <path class="arrow" d="M845 403 L900 430"/>
  <path class="arrow" d="M1150 438 L1210 438"/>

  <rect x="32" y="586" width="1416" height="166" class="lane"/>
  <text x="52" y="611" class="laneText">Generation and TOF Layer</text>

  <rect x="70" y="645" width="190" height="64" class="box gen"/>
  <text x="92" y="672" class="label">Codex generation</text>
  <text x="92" y="694" class="small">target normal JSONL</text>

  <rect x="330" y="645" width="210" height="64" class="box artifact"/>
  <text x="352" y="672" class="label">Validate and pack</text>
  <text x="352" y="694" class="small">JSONL -> Gen pkl</text>

  <rect x="615" y="645" width="210" height="64" class="box gen"/>
  <text x="637" y="672" class="label">Gen original TOF</text>
  <text x="637" y="694" class="small">security_check.py</text>

  <rect x="900" y="645" width="230" height="64" class="box gcad"/>
  <text x="922" y="672" class="label">Causal-TOF</text>
  <text x="922" y="694" class="small">score, filter, resample</text>

  <rect x="1210" y="645" width="200" height="64" class="box artifact"/>
  <text x="1232" y="672" class="label">Final synthetic pkl</text>
  <text x="1232" y="694" class="small">for downstream AD</text>

  <path class="arrow" d="M1310 481 L165 645"/>
  <path class="arrow" d="M260 677 L330 677"/>
  <path class="arrow" d="M540 677 L615 677"/>
  <path class="arrow" d="M825 677 L900 677"/>
  <path class="arrow" d="M1130 677 L1210 677"/>
  <path class="dash" d="M1025 481 L1005 645"/>
  <path class="dash" d="M390 230 L1005 645"/>

  <rect x="32" y="786" width="1416" height="94" class="lane"/>
  <text x="52" y="811" class="laneText">Evaluation and Reporting Layer</text>

  <rect x="330" y="828" width="260" height="34" class="box eval"/>
  <text x="352" y="851" class="label">Gen built-in downstream AD</text>

  <rect x="690" y="828" width="220" height="34" class="box eval"/>
  <text x="712" y="851" class="label">Per-seed metrics</text>

  <rect x="1010" y="828" width="230" height="34" class="box artifact"/>
  <text x="1032" y="851" class="label">Main summary tables</text>

  <path class="arrow" d="M1310 709 L590 828"/>
  <path class="arrow" d="M590 845 L690 845"/>
  <path class="arrow" d="M910 845 L1010 845"/>

  <text x="60" y="900" class="tiny">Key modules: causal_relation_prior_source.py, target_distribution_guard.py, causal_gss_reweight.py, validate_and_pack_codex_generation.py, gen_original_tof.py, causal_tof.py, gen_downstream_ad.py</text>
</svg>
